name: Android Build (Wasit Plus)
on:
  push:
    branches: [ main, master, development ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node.js dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Fix Tailwind oxide native binding
        run: |
          OXIDE_VERSION=$(node -e "console.log(require('./node_modules/@tailwindcss/oxide/package.json').version)")
          echo "Oxide version: $OXIDE_VERSION"
          npm install --no-save @tailwindcss/oxide-linux-x64-gnu@$OXIDE_VERSION
          mkdir -p node_modules/@tailwindcss/oxide/node_modules/@tailwindcss
          cp -r node_modules/@tailwindcss/oxide-linux-x64-gnu node_modules/@tailwindcss/oxide/node_modules/@tailwindcss/

      - name: Build Web Assets (React JS/TS)
        run: |
          npm run build

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Web assets with Capacitor Android wrapper
        run: |
          npx cap sync android

      - name: Grant Execution permissions for Gradle wrapper
        run: chmod +x android/gradlew

      - name: Compile and Build Debug APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload Compiled APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: WasitPlus-Debug-PWA-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
