name: Android Build (Wasit Plus)
on:
  push:
    branches: [ main, master, development ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GIT_TERMINAL_PROMPT: 0
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node.js dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build Web Assets (React JS/TS)
        run: |
          npm run build

      - name: Set up Java Development Kit (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Web assets with Capacitor Android wrapper
        run: |
          npx cap sync android

      - name: Regenerate Gradle wrapper
        run: |
          cd android && gradle wrapper --no-validate-url

      - name: Grant Execution permissions for Gradle wrapper
        run: chmod +x android/gradlew

      - name: Compile and Build Debug APK
        run: |
          cd android && ./gradlew :app:assembleDebug

      - name: Find APK
        run: |
          find $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -la $GITHUB_WORKSPACE/android/app/build/outputs/ 2>/dev/null || echo "No outputs folder"

      - name: Upload Compiled APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: WasitPlus-Debug-PWA-App
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
