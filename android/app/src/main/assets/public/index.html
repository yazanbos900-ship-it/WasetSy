    <script>
      // Capture beforeinstallprompt globally
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
        // Dispatch a custom event to notify React if it's already mounted
        window.dispatchEvent(new CustomEvent('pwa-prompt-available', { detail: e }));
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
            
            // Check for updates
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              if (installingWorker) {
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                      // New update available - notify the app
                      window.dispatchEvent(new CustomEvent('sw-update-available'));
                    }
                  }
                };
              }
            };

            // Periodically check for updates every 1 hour
            setInterval(() => {
              registration.update();
            }, 60 * 60 * 1000);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });

        // Listen for message from service worker
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data && (event.data.type === 'RELOAD_PAGE' || event.data.type === 'SW_ACTIVATED')) {
            console.log('Service Worker activated/updated. Performing smart reload.');
            // Save state or show a visual notice before doing a smooth reload
            localStorage.setItem('sw_just_updated', 'true');
            window.location.reload();
          }
        });
      }
    </script>
